<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/style.css" />
    <title>Agenda Studio</title>
  </head>
  <body>
    <header>
      <nav>
        <label class="mobile-menu">
          <input id="checkbox-menu" type="checkbox" />
          <span class="bar"></span>
        </label>
        <ul class="nav-list js-tabmenu">
          <li><a href="#agenda" >Agenda</a></li>
          <li><a href="#clientes" >Clientes</a></li>
          <li><a href="#servicos" >Servicos</a></li>
          <li><a href="#profissionais" >Profissionais</a></li>
          <li><a href="#relatorio" >Relatório</a></li>
        </ul>
        <a class="logo" href="#">Agenda Studio</a>
      </nav>
    </header>
    <main class="js-tabcontent">
      <section class="content">
        <h1>Agenda</h1>
      </section>

      <section class="content clientes show">
        <button id="abrirCadastro">Cadastrar Cliente</button>
        <section class="container" data-clientesCadastro>
          <form id="cadastroCliente">
            <button id="fecharCadastroCliente" type="button">X</button>
            <h1>Cadastro de Clientes</h1>
            <fieldset>
              <legend>Informações pessoais</legend>
              <input type="hidden" id="id" name="id" value="">
              <input
                id="nomeCompleto"
                name="nome"
                type="text"
                pattern=".*\s+.*"
                required
                aria-required="true"
                placeholder="Nome e Sobrenome"
                title="Digite nome e sobrenome."
              />
              <input
                id="email"
                name="email"
                type="email"
                placeholder="E-mail"
                required
                aria-required="true"
              />
              <input
                id="telefone"
                name="telefone"
                type="tel"
                placeholder="Telefone somente números"
                title="Digite apenas números."
                inputmode="tel"
                pattern="[0-9]{10,11}"
                maxlength="11"
                required
                aria-required="true"
              />
              <div class="formButtons">
                <button type="submit" id="cadastrar">Cadastrar</button>
                <button type="button" id="salvarAlteracoes">Salvar Alterações</button>
                <button type="button" id="cancelar">Cancelar</button>
              </div>
            </fieldset>
          </form>
          <div></div>
          <div class="divMsg">texto</div>
        </section>
        <ul class="lista-clientes" data-listaCliente=""></ul>
      </section>

      <section class="content">
        <h1>Serviços</h1>
      </section>

      <section class="content">
        <h1>Profissionais</h1>
      </section>

      <section class="content">
        <h1>Relatório</h1>
      </section>
    </main>
    <script src="./src/javascript/script.js" type="module"></script>
  </body>
</html>
