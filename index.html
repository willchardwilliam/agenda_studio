<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/styles/style.css" />
    <title>Agenda Studio</title>
  </head>
  <body>
    <header>
      <nav class="tab-buttons">
        <button class="tab-btn" content-id="agenda">Agenda</button>
        <button class="tab-btn" content-id="clientes">Clientes</button>
        <button class="tab-btn" content-id="servicos">Serviços</button>
        <button class="tab-btn" content-id="profissionais">
          Profissionais
        </button>
        <button class="tab-btn" content-id="relatorio">Relatório</button>
      </nav>
    </header>
    <main class="tab-contents">
      <div class="content show" id="agenda">
        <h1>Agenda</h1>
      </div>

      <div class="content clientes" id="clientes">
        <h1>Clientes</h1>

        <button class="btn-content" id="btn-initFormCliente">Cadastrar Cliente</button>
        <ul class="lista-clientes" data-listaCliente="">
        </ul>
      </div>

      <div class="content" id="servicos">
        <h1>Serviços</h1>
      </div>

      <div class="content" id="profissionais">
        <h1>Profissionais</h1>
      </div>

      <div class="content" id="relatorio">
        <h1>Relatório</h1>
      </div>
    </main>

    <section class="container" data-clientesCadastro>
      <form id="cadastroCliente">
        <button type="button" class="fechar">X</button>
        <h1>Cadastro de Clientes</h1>
        <fieldset>
          <legend>Informações pessoais</legend>

          <label for="nomeCompleto">Nome Completo:</label>
          <input
            id="nomeCompleto"
            name="nome"
            type="text"
            pattern=".*\s+.*"
            required
            aria-required="true"
            placeholder="Nome e Sobrenome"
            title="Digite nome e sobrenome."
          />

          <label for="email">E-mail:</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="E-mail"
            required
            aria-required="true"
          />

          <label for="telefone">Telefone:</label>
          <input
            id="telefone"
            name="telefone"
            type="tel"
            placeholder="Telefone somente números"
            title="Digite apenas números."
            inputmode="tel"
            pattern="[0-9]{10,11}"
            maxlength="11"
            required
            aria-required="true"
          />

          <button type="submit" id="cadastrar">Cadastrar</button>
        </fieldset>
      </form>
      <div id="mensagem"></div>
    </section>
    <script src="./src/javascript/script.js" type="module"></script>
  </body>
</html>
