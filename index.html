<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/style.css" />
    <title>Agenda Studio</title>
  </head>
  <body>
    <header>
      <nav class="tab-buttons">
        <button class="tab-btn" content-id="agenda">Agenda</button>
        <button class="tab-btn" content-id="clientes">Clientes</button>
        <button class="tab-btn" content-id="servicos">Serviços</button>
        <button class="tab-btn" content-id="profissionais">
          Profissionais
        </button>
        <button class="tab-btn" content-id="relatorio">Relatório</button>
      </nav>
    </header>
    <main class="tab-contents">
      <div class="content" id="agenda">
        <h1>Agenda</h1>
      </div>

      <section class="content show clientes" id="clientes">
        <button id="abrirCadastro">Cadastro</button>
        <section class="container" data-clientesCadastro>
          <form id="cadastroCliente">
            <h1>Cadastro de Clientes</h1>
            <fieldset>
              <legend>Informações pessoais</legend>
              <input type="hidden" id="registroId" name="registroId" value="">
              <input
                id="nomeCompleto"
                name="nome"
                type="text"
                pattern=".*\s+.*"
                required
                aria-required="true"
                placeholder="Nome e Sobrenome"
                title="Digite nome e sobrenome."
              />
              <input
                id="email"
                name="email"
                type="email"
                placeholder="E-mail"
                required
                aria-required="true"
              />
              <input
                id="telefone"
                name="telefone"
                type="tel"
                placeholder="Telefone somente números"
                title="Digite apenas números."
                inputmode="tel"
                pattern="[0-9]{10,11}"
                maxlength="11"
                required
                aria-required="true"
              />

              <button type="submit" id="cadastrar">Cadastrar</button>
              <button type="button" id="salvarAlteracoes">Salvar Alterações</button>
            </fieldset>
          </form>
        </section>
        <ul class="lista-clientes" data-listaCliente=""></ul>
      </section>

      <div class="content" id="servicos">
        <h1>Serviços</h1>
      </div>

      <div class="content" id="profissionais">
        <h1>Profissionais</h1>
      </div>

      <div class="content" id="relatorio">
        <h1>Relatório</h1>
      </div>
    </main>

    <script src="./src/javascript/script.js" type="module"></script>
  </body>
</html>
